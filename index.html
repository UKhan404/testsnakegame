<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="panel__header">
          <div>
            <p class="eyebrow">Classic arcade</p>
            <h1>Snake</h1>
          </div>
          <div class="scoreboard" aria-live="polite">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </div>

        <p class="status" id="status">Use arrow keys or WASD to start.</p>

        <div
          id="board"
          class="board"
          role="grid"
          aria-label="Snake game board"
        ></div>

        <div class="controls">
          <div class="controls__row">
            <button class="control-button" data-direction="up" aria-label="Move up">
              Up
            </button>
          </div>
          <div class="controls__row">
            <button class="control-button" data-direction="left" aria-label="Move left">
              Left
            </button>
            <button class="control-button" data-action="pause" aria-label="Pause or resume">
              Pause
            </button>
            <button class="control-button" data-direction="right" aria-label="Move right">
              Right
            </button>
          </div>
          <div class="controls__row">
            <button class="control-button" data-direction="down" aria-label="Move down">
              Down
            </button>
          </div>
        </div>

        <div class="actions">
          <button id="restart" class="action-button">Restart</button>
        </div>

        <p class="help">
          Arrow keys / WASD: move. Space or P: pause. Restart resets the run.
        </p>
      </section>
    </main>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
